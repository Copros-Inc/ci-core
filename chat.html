<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI Core | COPROS Ideation</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; overflow: hidden; }
        .ceo-card { background: #1e1b10; border: 2px solid #f59e0b; border-radius: 1.5rem 1.5rem 1.5rem 0; box-shadow: 0 10px 30px rgba(245,158,11,0.2); }
        .dev-card { background: #0c1a25; border: 2px solid #0ea5e9; border-radius: 1.5rem 1.5rem 0 1.5rem; box-shadow: 0 10px 30px rgba(14,165,233,0.2); }
        .mermaid { background: transparent !important; }
        .title-gold-small { color: #f59e0b; letter-spacing: 0.2em; font-size: 8px; font-weight: 800; }
        .img-preview { max-width: 250px; border-radius: 1rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="h-16 bg-slate-900 border-b border-white/10 flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <h1 class="text-xl font-black tracking-tighter text-white italic leading-none">COPROS</h1>
                <p class="title-gold-small uppercase leading-none mt-1">IDEATION CORE</p>
            </div>
            <select id="project-select" onchange="changeProject(this.value)" class="bg-slate-800 text-[11px] font-bold outline-none rounded px-2 py-1 text-slate-300">
                <option value="default">岩盤対策 基本プロジェクト</option>
                <option value="new">+ 新規作成</option>
            </select>
        </div>
        <div class="flex items-center gap-4">
            <div id="user-display" class="text-[9px] font-bold px-4 py-1.5 rounded-full border border-white/10 bg-white/5 tracking-widest uppercase"></div>
            <button onclick="setApiKey()" class="text-slate-600 hover:text-yellow-500 transition-all text-xl">⚙️</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden">
        <section class="h-1/3 p-4 overflow-auto bg-black border-b border-white/5 relative flex items-center justify-center">
            <div id="mermaid-render" class="mermaid">graph LR\nStart["プロジェクト始動"]</div>
        </section>
        <section id="chat-content" class="flex-1 overflow-y-auto p-6 space-y-8 bg-slate-950/50"></section>
        <footer class="p-4 bg-slate-900 border-t border-white/10 space-y-4">
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar text-[10px]">
                <button onclick="addTemplate('【提案】')" class="whitespace-nowrap bg-slate-800 px-4 py-2 rounded-full border border-white/10">💡 提案</button>
                <button onclick="document.getElementById('file-input').click()" class="whitespace-nowrap bg-sky-900/40 px-4 py-2 rounded-full border border-sky-500/30 text-sky-300">📸 現場写真</button>
                <button onclick="startVoice()" id="voice-btn" class="whitespace-nowrap bg-yellow-900/40 px-4 py-2 rounded-full border border-yellow-500/30 text-yellow-300">🎙️ 音声入力</button>
                <input type="file" id="file-input" accept="image/*" class="hidden" onchange="processImage(this)">
            </div>
            <div class="flex gap-3 max-w-5xl mx-auto">
                <textarea id="msg-input" rows="1" class="flex-1 bg-slate-800 border-none rounded-xl px-4 py-3 text-sm outline-none focus:ring-1 focus:ring-yellow-500 shadow-inner" placeholder="メッセージを入力..."></textarea>
                <button onclick="handleSend()" class="bg-yellow-500 w-12 h-12 rounded-xl flex items-center justify-center text-black shadow-lg transition-transform active:scale-90">🚀</button>
            </div>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADYKNA4q7akuYaCYBvU3g40tYcE-jCHaM",
            authDomain: "copros-ci-core.firebaseapp.com",
            projectId: "copros-ci-core",
            storageBucket: "copros-ci-core.firebasestorage.app",
            messagingSenderId: "50555057257",
            appId: "1:50555057257:web:a7f71700f403bbca599ef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const user = params.get('user') || 'CEO';
        let currentProjectId = localStorage.getItem('CURRENT_PROJECT_ID') || 'default';

        document.getElementById('user-display').innerText = user === 'CEO' ? '宮﨑社長' : '大森弘三';
        document.getElementById('user-display').classList.add(user === 'CEO' ? 'text-yellow-500' : 'text-sky-400');
        document.getElementById('project-select').value = currentProjectId;

        mermaid.initialize({ startOnLoad: true, theme: 'dark', flowchart: { curve: 'basis', useMaxWidth: true } });

        let unsubscribe = null;
        let attachedImage = "";

        window.changeProject = (val) => {
            if (val === 'new') {
                const name = prompt("新しいプロジェクト名:");
                if (name) {
                    const id = "proj_" + Date.now();
                    let list = JSON.parse(localStorage.getItem('PROJECT_LIST') || '[]');
                    list.push({id, name}); localStorage.setItem('PROJECT_LIST', JSON.stringify(list));
                    val = id; location.reload();
                } else { document.getElementById('project-select').value = currentProjectId; return; }
            }
            currentProjectId = val; localStorage.setItem('CURRENT_PROJECT_ID', val); loadMessages();
        };

        JSON.parse(localStorage.getItem('PROJECT_LIST') || '[]').forEach(p => {
            const opt = document.createElement('option'); opt.value = p.id; opt.innerText = p.name;
            const select = document.getElementById('project-select'); select.insertBefore(opt, select.lastElementChild);
        });

        function loadMessages() {
            if (unsubscribe) unsubscribe();
            const q = query(collection(db, "projects", currentProjectId, "messages"), orderBy("timestamp", "asc"));
            unsubscribe = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-content');
                container.innerHTML = ""; let logs = [];
                snapshot.forEach((doc) => {
                    const d = doc.data(); logs.push(d);
                    const isMe = (d.role === user);
                    const isCEO = (d.role === 'CEO');
                    const time = d.timestamp ? new Date(d.timestamp.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                    const bubble = document.createElement('div');
                    bubble.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full animate-fade-in`;
                    bubble.innerHTML = `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%]"><span class="text-[9px] font-black ${isCEO ? 'text-yellow-500 ml-2' : 'text-sky-400 mr-2'} uppercase mb-1">${d.sender} ${isMe ? '(あなた)' : ''}</span><div class="${isCEO ? 'ceo-card' : 'dev-card'} p-4 shadow-xl text-left">${d.text ? `<p class="text-base font-medium leading-relaxed">${d.text.replace(/\n/g, '<br>')}</p>` : ""}${d.image ? `<img src="${d.image}" class="img-preview" onclick="window.open(this.src)">` : ""}<div class="mt-2 text-[10px] opacity-40 flex justify-between gap-6 border-t border-white/10 pt-1"><span>${time}</span><div class="flex gap-2"><span onclick="addLike('${doc.id}')" class="cursor-pointer">👍 ${d.likes || 0}</span>${isMe ? '<span>既読</span>' : ''}</div></div></div></div>`;
                    container.appendChild(bubble);
                });
                container.scrollTop = container.scrollHeight;
                if(logs.length > 0) updateAI(logs);
            });
        }
        loadMessages();

        window.handleSend = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text && !attachedImage) return;
            await addDoc(collection(db, "projects", currentProjectId, "messages"), { 
                text, sender: user === 'CEO' ? '宮﨑社長' : '大森弘三', 
                role: user, timestamp: serverTimestamp(), image: attachedImage, likes: 0 
            });
            input.value = ""; attachedImage = "";
        };

        window.addLike = async (docId) => {
            const ref = doc(db, "projects", currentProjectId, "messages", docId);
            const snap = await getDoc(ref);
            await updateDoc(ref, { likes: (snap.data().likes || 0) + 1 });
        };

        // --- AI図解更新（さらに強力なエラー回避版） ---
        async function updateAI(logs) {
            const key = localStorage.getItem('GEMINI_API_KEY');
            if(!key) return;

            const chatText = logs.slice(-5).map(l => l.text).join('\n');
            const prompt = `あなたは建設現場の要約職人です。以下の会話から、重要な単語を3〜5個抽出し、それらを矢印で繋いだMermaid形式の graph LR を作成してください。
            【ルール】
            - 出力は必ず graph LR から始めること。
            - 単語は必ず [ ] で囲むこと。
            - [ ] の中には特殊記号を使わず、日本語とアルファベットのみにすること。
            - 余計な説明は一切せず、コードのみを出力すること。
            会話ログ：
            ${chatText}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, { 
                    method: "POST", headers: {"Content-Type":"application/json"}, 
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) 
                });
                const data = await res.json();
                let aiRes = data.candidates[0].content.parts[0].text;
                
                // 1. graph LR から始まる行を探す
                let code = aiRes.match(/graph LR[\s\S]*/)?.[0] || "";
                
                // 2. 不要な装飾記号を除去
                code = code.replace(/```mermaid/g, "").replace(/```/g, "").trim();
                
                // 3. 記号が含まれる行を安全にクリーニング（ここが最重要）
                code = code.split('\n')
                           .filter(line => line.includes('-->'))
                           .map(line => line.replace(/[^\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\w\s\-\-\>\[\]]/g, "")) // 日本語と基本記号以外削除
                           .join('\n');
                
                if(code.startsWith("graph LR")) { 
                    const el = document.getElementById('mermaid-render');
                    el.removeAttribute('data-processed'); 
                    el.innerHTML = code; 
                    await mermaid.run(); 
                }
            } catch(e) { console.error("AI Error:", e); }
        }

        window.processImage = (input) => {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 800;
                    if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    attachedImage = canvas.toDataURL('image/jpeg', 0.6);
                    alert("画像を添付しました。🚀で送信してください。");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.setApiKey = () => {
            const k = prompt("Gemini APIキーを入力:", localStorage.getItem('GEMINI_API_KEY') || "");
            if(k) { localStorage.setItem('GEMINI_API_KEY', k); location.reload(); }
        };
        window.addTemplate = (t) => { document.getElementById('msg-input').value = t + document.getElementById('msg-input').value; };
        
        window.startVoice = () => {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("非対応ブラウザです");
            const rec = new Speech(); rec.lang = 'ja-JP';
            rec.onstart = () => document.getElementById('voice-btn').innerText = "収音中...";
            rec.onresult = (e) => document.getElementById('msg-input').value += e.results[0][0].transcript;
            rec.onend = () => document.getElementById('voice-btn').innerText = "🎙️ 音声入力";
            rec.start();
        };
    </script>
</body>
</html>
